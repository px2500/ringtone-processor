<h2>Ringtone Test Samples</h2>

<div class="ringtone">
  <div class="title">Highway Kind 2</div>

  <audio src="Highway Kind 2.m4r"></audio>

  <div class="controls">
    <button onclick="playTone(this)">▶ Play</button>

</div>

<script>

function playTone(button){

  const audio = button.parentElement.parentElement.querySelector("audio");

  document.querySelectorAll("audio").forEach(a=>{
    if(a !== audio){
      a.pause();
      a.currentTime = 0;
    }
  });

  audio.play();
}

</script>
